name: Build and Push to Artifact Registry
on:
  push:
    branches: [main]
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Google Auth
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "\${{ secrets.GCP_SA_KEY }}"
      - name: Set up Cloud SDK
        uses: "google-github-actions/setup-gcloud@v1"
      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast2-docker.pkg.dev
      - name: Build and Push
        run: |
          docker build -t asia-northeast2-docker.pkg.dev/whisper-gke-lab-1774527143/whisper-repo/whisper-api:v1 .
          docker push asia-northeast2-docker.pkg.dev/whisper-gke-lab-1774527143/whisper-repo/whisper-api:v1
